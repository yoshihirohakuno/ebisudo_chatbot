<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ chatbot_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body class="widget-page">
    <main class="chat-card widget-card">
      <header class="chat-header compact">
        <p class="eyebrow">FAQ Chat Bot</p>
        <h1>{{ chatbot_title }}</h1>
      </header>

      <div id="messages" class="messages widget-messages">
        <article class="message bot">
          <p>えびす堂サイトの公開情報から回答します。気軽に質問してください。</p>
        </article>
      </div>

      <form id="chat-form" class="chat-form widget-form">
        <label for="message" class="sr-only">質問</label>
        <textarea id="message" name="message" rows="2" placeholder="質問を入力" required></textarea>
        <button type="submit">送信</button>
      </form>
    </main>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  </body>
</html>
